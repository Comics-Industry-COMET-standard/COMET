name: Report an error
description: A wrong description, typo, or inconsistency in the standard
title: "[Error] "
labels: ["error"]
body:
  - type: input
    id: location
    attributes:
      label: Where is the error?
      placeholder: e.g. standard/fields/044-Language.yaml, or the FormatType picklist
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What's wrong, and what should it say instead?
    validations:
      required: true
